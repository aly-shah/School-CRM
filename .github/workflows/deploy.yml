name: Deploy to VPS

on:
  push:
    branches: [main]
    paths-ignore:
      - 'android-app/**'
      - '**.md'
  workflow_dispatch:

concurrency:
  group: deploy-vps
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check VPS secrets
        id: cfg
        run: |
          if [ -n "${{ secrets.VPS_HOST }}" ] && [ -n "${{ secrets.VPS_USER }}" ] && [ -n "${{ secrets.VPS_SSH_KEY }}" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Auto-deploy skipped — set all three secrets: VPS_HOST, VPS_USER, VPS_SSH_KEY."
          fi

      - name: Redeploy over SSH
        if: steps.cfg.outputs.ready == 'true'
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: bash ${{ secrets.VPS_APP_DIR || '~/School-CRM' }}/update.sh
